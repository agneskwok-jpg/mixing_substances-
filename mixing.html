<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>Particle Mixing Simulator 2.0</title>    <style>        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; touch-action: none; margin: 0; padding: 10px; }        #app-container { display: flex; flex-direction: row; gap: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 95vw; }        canvas { background: #fff; border: 4px solid #333; border-top: none; border-radius: 0 0 15px 15px; }        .controls { display: flex; flex-direction: column; gap: 12px; width: 220px; }        .digital-display { background: #2d3436; color: #55efc4; padding: 10px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.4; }        .btn-spawn { padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; border: 2px solid rgba(0,0,0,0.1); }        #btn-soya { background: #ffeaa7; }        #btn-sago { background: #fab1a0; }        .btn-action { padding: 12px; font-size: 16px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; }        #shake-btn { background: #0984e3; }        #reset-btn { background: #d63031; }        .highlight { color: #ffeaa7; }        .highlight-sago { color: #fab1a0; }    </style></head><body>    <h2>Particle Theory: Volume Mixing</h2>        <div id="app-container">        <div class="controls">            <div class="digital-display">                VOL ADDED:<br>                - Soya: <span id="soya-vol" class="highlight">0</span> ml<br>                - Sago: <span id="sago-vol" class="highlight-sago">0</span> ml<br>                <hr>                TOTAL MIXTURE:<br>                - Actual: <span id="total-vol" style="color:#fff">0</span> ml            </div>            <div id="btn-soya" class="btn-spawn">Add Soya Bean<br>(Large)</div>            <div id="btn-sago" class="btn-spawn">Add Sago<br>(Small)</div>                        <button id="shake-btn" class="btn-action">SHAKE MIXTURE</button>            <button id="reset-btn" class="btn-action">Reset Lab</button>        </div>        <div style="position: relative;">            <div style="position: absolute; left: -30px; height: 400px; display: flex; flex-direction: column-reverse; justify-content: space-between; font-weight: bold; font-size: 12px; color: #636e72;">                <span>0</span><span>20</span><span>40</span><span>60</span><span>80</span><span>100</span>            </div>            <canvas id="simCanvas" width="180" height="400"></canvas>        </div>    </div>    <script>        const canvas = document.getElementById('simCanvas');        const ctx = canvas.getContext('2d');        const soyaDisp = document.getElementById('soya-vol');        const sagoDisp = document.getElementById('sago-vol');        const totalDisp = document.getElementById('total-vol');                let particles = [];        let addedSoya = 0;        let addedSago = 0;        let shakeTime = 0;        class Particle {            constructor(x, y, radius, color, type) {                this.x = x; this.y = y; this.radius = radius;                this.color = color; this.type = type;                this.vx = (Math.random() - 0.5) * 2; this.vy = 0;            }            draw() {                ctx.beginPath();                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);                ctx.fillStyle = this.color;                ctx.fill();                ctx.stroke();            }            update() {                this.vy += 0.3; // Gravity                if (shakeTime > 0) {                    this.vx += (Math.random() - 0.5) * 5;                    this.vy -= Math.random() * 2;                }                this.x += this.vx; this.y += this.vy;                if (this.y + this.radius > canvas.height) {                    this.y = canvas.height - this.radius;                    this.vy *= -0.1;                }                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {                    this.vx *= -0.5;                    this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;                }                particles.forEach(other => {                    if (other === this) return;                    const dx = other.x - this.x;                    const dy = other.y - this.y;                    const dist = Math.sqrt(dx * dx + dy * dy);                    const minDist = this.radius + other.radius;                    if (dist < minDist) {                        const angle = Math.atan2(dy, dx);                        const force = (minDist - dist) * 0.5;                        this.vx -= Math.cos(angle) * force;                        this.vy -= Math.sin(angle) * force;                    }                });                this.vx *= 0.9; this.vy *= 0.9;            }        }        function spawn(type) {            if (type === 'soya') { addedSoya += 5; soyaDisp.innerText = addedSoya; }            else { addedSago += 5; sagoDisp.innerText = addedSago; }            for(let i=0; i<8; i++) {                particles.push(new Particle(canvas.width/2 + (Math.random()-0.5)*20, 30, type === 'soya' ? 10 : 4, type === 'soya' ? '#f1c40f' : '#fab1a0', type));            }        }        document.getElementById('btn-soya').addEventListener('touchstart', (e) => { e.preventDefault(); spawn('soya'); });        document.getElementById('btn-sago').addEventListener('touchstart', (e) => { e.preventDefault(); spawn('sago'); });        document.getElementById('btn-soya').addEventListener('click', () => spawn('soya'));        document.getElementById('btn-sago').addEventListener('click', () => spawn('sago'));                document.getElementById('shake-btn').addEventListener('click', () => { shakeTime = 60; });        document.getElementById('reset-btn').addEventListener('click', () => {             particles = []; addedSoya = 0; addedSago = 0;            soyaDisp.innerText = 0; sagoDisp.innerText = 0;        });        function animate() {            ctx.clearRect(0, 0, canvas.width, canvas.height);            if (shakeTime > 0) shakeTime--;            particles.forEach(p => { p.update(); p.draw(); });                        let highestY = canvas.height;            particles.forEach(p => { if (p.y - p.radius < highestY) highestY = p.y - p.radius; });            totalDisp.innerText = particles.length === 0 ? 0 : Math.round((canvas.height - highestY) / 3.8);            requestAnimationFrame(animate);        }        animate();    </script></body></html>
